{% extends "base.html" %}

{% block content %}
<style>
    .tag-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 15px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
    }

    .tag {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 15px;
        background-color: var(--tag-neutral);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s ease;
        user-select: none;
    }

    .tag.selected {
        background-color: var(--tag-include);
        border-color: var(--success);
        color: #86efac;
    }

    .tag.excluded {
        background-color: var(--tag-exclude);
        border-color: var(--danger);
        color: #fca5a5;
        text-decoration: line-through;
    }

    .tag:hover {
        transform: translateY(-2px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .hidden-select {
        display: none !important;
    }

    .site-input-container {
        position: relative;
    }

    .selected-sites {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 0;
    }

    .selected-site {
        background-color: var(--bg-elevated);
        border: 1px solid var(--accent);
        color: var(--text-primary);
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .remove-site {
        cursor: pointer;
        color: var(--danger);
        font-weight: bold;
    }

    .search-button {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        margin-top: 1.5rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 0.05em;
        transition: background 0.2s, box-shadow 0.2s;
    }

    .search-button:hover {
        background: var(--accent-hover);
        box-shadow: 0 4px 16px var(--accent-glow);
    }

    .search-type-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 1rem;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: var(--bg-elevated);
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .search-type-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
    }
    .search-type-btn.active {
        background: var(--accent-glow);
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
    }

    .quick-filter-btn {
        padding: 0.45rem 1rem;
        border-radius: 20px;
        border: 1px solid var(--accent);
        background: var(--accent-glow);
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .quick-filter-btn:hover {
        background: var(--accent);
        color: #fff;
    }
    .quick-filter-btn.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .tag-legend {
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
    }

    .tag-legend span {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
</style>

<div class="form-container">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('search') }}" class="mb-4">

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">

            <button type="button" class="quick-filter-btn" id="btnClear" onclick="clearQuickFilter()" style="background:var(--bg-elevated);border-color:var(--border-color);color:var(--text-muted);">

<script>
    // 查詢類型切換
    document.querySelectorAll('input[name="search_type"]').forEach(radio => {
        radio.addEventListener('change', function () {
            document.querySelectorAll('.search-type-btn').forEach(l => l.classList.remove('active'));
            this.parentElement.classList.add('active');
            const labels = { username: '使用者名稱', email: 'Email', nickname: '暱稱' };
            const placeholders = {
                username: '輸入一個或多個使用者名稱（空格或逗號分隔）...',
                email: '輸入一個或多個 Email 地址（空格或逗號分隔）...',
                nickname: '輸入一個或多個暱稱（空格或逗號分隔）...'
            };
            document.getElementById('queryLabel').textContent = labels[this.value];
            document.getElementById('usernames').placeholder = placeholders[this.value];
        });
    });

    function applyTopFilter(n) {
        const topInput = document.getElementById('top_sites');
        const allCheck = document.getElementById('all_sites');
        document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('active'));
        if (n === 0) {
            allCheck.checked = true;
            topInput.disabled = true;
            topInput.value = '';
            document.getElementById('btnAll').classList.add('active');
        } else {
            allCheck.checked = false;
            topInput.disabled = false;
            topInput.value = n;
            document.getElementById('btn500').classList.add('active');
        }
    }

    function applyQuickFilter(countryCode) {
        // 先清除所有 tag 狀態
        document.querySelectorAll('#tagCloud .tag').forEach(t => {
            t.classList.remove('selected', 'excluded');
        });
        // 把指定國家 tag 設為 selected
        const target = document.querySelector(`#tagCloud .tag[data-value="${countryCode}"]`);
        if (target) {
            target.classList.add('selected');
            // 展開篩選條件區塊讓使用者看到
            const body = document.getElementById('filters');
            if (body && !body.classList.contains('show')) {
                toggleCollapse('filters');
            }
        }
        // 更新 hidden selects
        updateTagSelects();
        // 按鈕高亮
        document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btnTW').classList.add('active');
    }

    function clearQuickFilter() {
        document.querySelectorAll('#tagCloud .tag').forEach(t => {
            t.classList.remove('selected', 'excluded');
        });
        updateTagSelects();
        document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('active'));
    }

    function updateTagSelects() {
        const hiddenSelect = document.getElementById('tags');
        const excludedSelect = document.getElementById('excludedTags');
        if (!hiddenSelect) return;
        Array.from(hiddenSelect.options).forEach(opt => opt.selected = false);
        excludedSelect.innerHTML = '';
        document.querySelectorAll('#tagCloud .tag').forEach(tagEl => {
            const val = tagEl.dataset.value;
            if (tagEl.classList.contains('selected')) {
                const option = Array.from(hiddenSelect.options).find(opt => opt.value === val);
                if (option) option.selected = true;
            } else if (tagEl.classList.contains('excluded')) {
                const opt = document.createElement('option');
                opt.value = val;
                opt.selected = true;
                excludedSelect.appendChild(opt);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const tagCloud = document.getElementById('tagCloud');
        const hiddenSelect = document.getElementById('tags');
        const excludedSelect = document.getElementById('excludedTags');
        const allTags = Array.from(hiddenSelect.options).map(opt => ({
            value: opt.value,
            label: opt.text,
            group: opt.dataset.group || 'category'
        }));

        let lastGroup = '';
        allTags.forEach(tag => {
            if (tag.group !== lastGroup && tag.group === 'country') {
                const separator = document.createElement('div');
                separator.style.cssText = 'width:100%;margin:8px 0 4px;padding:4px 0;border-top:1px solid var(--border-color);font-size:12px;color:var(--text-muted);';
                separator.textContent = '國家／地區';
                tagCloud.appendChild(separator);
            }
            lastGroup = tag.group;

            const tagElement = document.createElement('span');
            tagElement.className = 'tag';
            tagElement.textContent = tag.label;
            tagElement.dataset.value = tag.value;

            tagElement.addEventListener('click', function (e) {
                e.preventDefault();
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    this.classList.add('excluded');
                } else if (this.classList.contains('excluded')) {
                    this.classList.remove('excluded');
                } else {
                    this.classList.add('selected');
                }
                updateTagSelects();
            });

            tagCloud.appendChild(tagElement);
        });

        // 站點選擇
        const siteInput = document.getElementById('siteInput');
        const hiddenInput = document.getElementById('site');
        const selectedSitesContainer = document.getElementById('selectedSites');
        let selectedSites = new Set();

        function updateHiddenInput() {
            hiddenInput.value = Array.from(selectedSites).join(',');
        }

        function addSite(site) {
            if (site && !selectedSites.has(site)) {
                selectedSites.add(site);
                updateHiddenInput();
                const siteElement = document.createElement('span');
                siteElement.className = 'selected-site';
                siteElement.innerHTML = `${site}<span class="remove-site" data-site="${site}">&times;</span>`;
                selectedSitesContainer.appendChild(siteElement);
            }
        }

        function removeSite(site) {
            selectedSites.delete(site);
            updateHiddenInput();
            selectedSitesContainer.querySelectorAll('.selected-site').forEach(el => {
                if (el.querySelector('.remove-site').dataset.site === site) el.remove();
            });
        }

        siteInput.addEventListener('change', function () {
            const value = this.value.trim();
            if (value) { addSite(value); this.value = ''; }
        });

        selectedSitesContainer.addEventListener('click', function (e) {
            if (e.target.classList.contains('remove-site')) removeSite(e.target.dataset.site);
        });

        siteInput.addEventListener('paste', function (e) {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            paste.split(',').map(s => s.trim()).filter(s => s).forEach(addSite);
        });

        document.querySelector('form').addEventListener('submit', function () {
            const selectedTags = Array.from(tagCloud.querySelectorAll('.tag.selected'));
            Array.from(hiddenSelect.options).forEach(opt => {
                opt.selected = selectedTags.some(tag => tag.dataset.value === opt.value);
            });
            updateHiddenInput();
        });
    });
</script>
{% endblock %}
